<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    input { margin: 0.25rem; padding: 0.25rem; width: 6rem; }
    button { margin: 0.25rem; }
    p { font-weight: bold; }
    #paraadd { color: green; }
    #parasub { color: red; }
    #paramult { color: blue; }
    #paradiv { color: purple; }
  </style>
</head>
<body>
  <h1>Calculator</h1>
  <input id="num1" type="number" placeholder="num1">
  <input id="num2" type="number" placeholder="num2">
  <br>
  <button id="btnadd">Add</button>
  <button id="btnsub">Subtract</button>
  <button id="btnmult">Multiply</button>
  <button id="btndiv">Divide</button>
  <p id="paraadd"></p>
  <p id="parasub"></p>
  <p id="paramult"></p>
  <p id="paradiv"></p>
  <script>
    const n1 = () => Number(document.getElementById("num1").value);
    const n2 = () => Number(document.getElementById("num2").value);
    document.getElementById("btnadd").addEventListener("click", () => { document.getElementById("paraadd").innerHTML = "Sum: " + (n1() + n2()); });
    document.getElementById("btnsub").addEventListener("click", () => { document.getElementById("parasub").innerHTML = "Difference: " + (n1() - n2()); });
    document.getElementById("btnmult").addEventListener("click", () => { document.getElementById("paramult").innerHTML = "Product: " + (n1() * n2()); });
    document.getElementById("btndiv").addEventListener("click", () => { document.getElementById("paradiv").innerHTML = "Quotient: " + (n1() / n2()); });
  </script>
</body>
</html>
